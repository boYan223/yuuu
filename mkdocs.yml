site_name: 我的博客
site_description: 分享技术与生活
site_url: https://boyan223.github.io/  # 替换成你的实际网址

theme:
  name: material
  language: zh
  palette:
    # 亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切换到暗黑模式
    # 暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

  features:
    - navigation.instant       # 即时加载，像 SPA 一样
    - navigation.tracking      # 地址栏跟随标题变化
    - navigation.tabs          # 顶部标签式导航
    - navigation.top           # 返回顶部按钮
    - search.highlight         # 搜索结果高亮
    - search.share             # 分享搜索结果链接
